<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>404 – Dogger Bank</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1a1a2e;
        color: #e0e0f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 20px;
        padding: 24px;
        text-align: center;
      }
      .code {
        font-size: clamp(5rem, 20vw, 9rem);
        font-weight: 900;
        color: #2a4a7f;
        letter-spacing: -4px;
        line-height: 1;
        user-select: none;
      }
      .emoji {
        font-size: clamp(2.5rem, 8vw, 4rem);
      }
      h1 {
        font-size: clamp(1.4rem, 4vw, 2rem);
        font-weight: 700;
        color: #b0c8f0;
      }
      p {
        font-size: clamp(0.95rem, 2.5vw, 1.1rem);
        color: #7090b0;
        max-width: 480px;
        line-height: 1.6;
      }
      a {
        margin-top: 8px;
        display: inline-block;
        background: #2a4a7f;
        color: #e0e8ff;
        text-decoration: none;
        padding: 12px 28px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1rem;
        transition: background 0.15s;
      }
      a:hover {
        background: #3a5a9f;
      }
    </style>
  </head>
  <body>
    <div class="code">404</div>
    <div class="emoji">🐬</div>
    <h1>Funds Not Found</h1>
    <p>
      Like Doggerland itself, this page has sunk beneath the North Sea. Your
      account remains perfectly safe — we just can't locate what you were
      looking for.
    </p>
    <a href="/">← Back to Dogger Bank</a>
  </body>
</html>
