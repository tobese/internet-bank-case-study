server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Service worker must never be cached so the browser always detects updates
    location = /service-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SSE streaming endpoint – must not be buffered
    location /api/primes/ {
        proxy_pass http://api:8282;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }

    # Proxy all other API requests to the backend service
    location /api/ {
        proxy_pass http://api:8282;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve static files; fall back to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compression for WASM and framework assets
    gzip on;
    gzip_types application/wasm application/octet-stream application/javascript text/css;
}
