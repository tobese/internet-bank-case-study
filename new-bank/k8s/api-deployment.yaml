apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: internet-bank
  labels:
    app: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8282"
    spec:
      containers:
        - name: api
          image: internet-bank/api-application:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8282
          env:
            - name: SERVER_PORT
              value: "8282"
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "internet_bank"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/fac/1
              port: 8282
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/fac/1
              port: 8282
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: primes-cache
              mountPath: /data/primes-cache
      volumes:
        - name: primes-cache
          persistentVolumeClaim:
            claimName: primes-cache
