version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: internet-bank-postgres
    environment:
      POSTGRES_DB: internet_bank
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: pUQX0eja56l0bLBR8u9Wb3KOI43E1o5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankuser -d internet_bank"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internet-bank

  redis:
    image: redis:7-alpine
    container_name: internet-bank-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internet-bank

  api:
    build:
      context: ./api-application
      dockerfile: Dockerfile
    container_name: internet-bank-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: internet_bank
      DB_USER: bankuser
      DB_PASSWORD: pUQX0eja56l0bLBR8u9Wb3KOI43E1o5
      SERVER_PORT: 8282
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OTEL_SERVICE_NAME: internet-bank-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      JAVA_TOOL_OPTIONS: "-javaagent:/app/opentelemetry-javaagent.jar"
    ports:
      - "8282:8282"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internet-bank

  web-client:
    build:
      context: ./multi-client
      dockerfile: Dockerfile
    container_name: internet-bank-web
    ports:
      - "80:8080"
    depends_on:
      - api
    networks:
      - internet-bank

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: internet-bank-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://bankuser:pUQX0eja56l0bLBR8u9Wb3KOI43E1o5@postgres:5432/internet_bank?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internet-bank

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: internet-bank-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internet-bank

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: internet-bank-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"
    depends_on:
      - api
      - postgres-exporter
      - redis-exporter
    networks:
      - internet-bank

  tempo:
    image: grafana/tempo:2.7.1
    container_name: internet-bank-tempo
    ports:
      - "3200:3200"
      - "4317:4317"
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/tempo-config.yml
    networks:
      - internet-bank

  loki:
    image: grafana/loki:3.4.2
    container_name: internet-bank-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - internet-bank

  promtail:
    image: grafana/promtail:3.4.2
    container_name: internet-bank-promtail
    volumes:
      - ./loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    networks:
      - internet-bank

  grafana:
    image: grafana/grafana:11.6.1
    container_name: internet-bank-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - internet-bank

volumes:
  postgres_data:
  prometheus_data:
  redis_data:
  loki_data:
  tempo_data:
  grafana_data:

networks:
  internet-bank:
    driver: bridge
