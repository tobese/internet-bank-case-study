global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "spring-boot-api"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["api:8282"]
        labels:
          service: "internet-bank-api"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "internet-bank-postgres"

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "internet-bank-redis"
